<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intelligent Assistant</title>
</head>

<body>
  <div id="root"></div>

  <!--
    Google Translate — div conteneur HORS ÉCRAN (pas display:none !).
    display:none empêche Google Translate de s'initialiser correctement.
    On utilise position:fixed avec top:-9999px à la place.
  -->
  <div id="google_translate_element"
    style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;">
  </div>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        { pageLanguage: 'fr', autoDisplay: false },
        'google_translate_element'
      );
      // Signal que le widget est prêt — lu par TranslationWrapper.jsx
      window.__googleTranslateReady = true;
      window.dispatchEvent(new Event('googleTranslateReady'));
    }
  </script>

  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async
    defer>
    </script>

  <style>
    /* Masquer l'UI Google Translate */
    .goog-te-banner-frame.skiptranslate {
      display: none !important;
    }

    .skiptranslate {
      display: none !important;
    }

    body {
      top: 0px !important;
    }

    .goog-text-highlight {
      background-color: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    .goog-tooltip,
    .goog-tooltip:hover {
      display: none !important;
    }

    .goog-te-gadget {
      display: none !important;
    }
  </style>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
